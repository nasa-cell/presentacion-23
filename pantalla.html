<!DOCTYPE html>
<html lang="es">
<head>
  <title>CONESION - Pantalla</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      background: #000; 
      height: 100vh; 
      overflow: hidden; 
      font-family: Arial, sans-serif; 
      color: white; 
    }
    #viewer { 
      position: fixed; 
      top: 0; left: 0; 
      width: 100vw; height: 100vh; 
      background: #000; 
      opacity: 0; 
      transition: opacity 0.8s ease-in-out; 
      display: flex; 
      align-items: center; 
      justify-content: center;
    }
    #viewer.show { opacity: 1; }
    #viewer img, #viewer video { 
      max-width: 95vw; 
      max-height: 95vh; 
      object-fit: contain; 
      border-radius: 12px;
    }
    #viewer video { 
      width: 100%; 
      height: auto; 
      background: #000;
    }
    #counter { 
      position: fixed; 
      bottom: 30px; 
      left: 50%; 
      transform: translateX(-50%); 
      background: rgba(0,255,136,0.9); 
      color: #000; 
      padding: 12px 24px; 
      border-radius: 25px; 
      font-size: 24px; 
      font-weight: bold; 
      box-shadow: 0 8px 32px rgba(0,255,136,0.4);
      z-index: 100;
    }

  </style>
</head>
<body>
  <div id="viewer"></div>
  <div id="counter">0 / 0</div>


  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io({
      path: "/socket.io",
      transports: ["websocket"],
      secure: true,
      upgrade: false,
      reconnection: true,
      reconnectionAttempts: Infinity,
      reconnectionDelay: 1000
    });
    let media = [];

    let currentIndex = 0;
    
    const viewer = document.getElementById('viewer');
    const counter = document.getElementById('counter');

    
    // Fullscreen on click
    document.addEventListener('click', () => {
      if (!document.fullscreenElement) document.documentElement.requestFullscreen();
    });
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') document.exitFullscreen();
    });
    
    function showMedia(index) {
      viewer.classList.remove('show');
      
      currentIndex = index;
      const file = media[index];
      if (!file) return;
      
      viewer.innerHTML = '';
      counter.textContent = `${index + 1} / ${media.length}`;
      
      if (file.type === 'video') {
        const video = document.createElement('video');
        video.src = `/media/${file.filename}`;
        video.preload = 'auto';
        video.autoplay = true;
        video.muted = false; // Audio ON - user gesture handles autoplay
        video.playsInline = true;
        video.controls = true; // User volume/scrub
        video.loop = false;
        video.onloadeddata = () => {
          viewer.classList.add('show');
          socket.emit('video:loaded');
        };
        video.onerror = () => {
          viewer.innerHTML = '<h1>❌ Error de video</h1>';
        };
        video.onended = () => socket.emit('nav:next');
        viewer.appendChild(video);
      } else {
        // Image
        const img = document.createElement('img');
        img.src = `/media/${file.filename}`;
        img.onload = () => {
          viewer.classList.add('show');
        };
        img.onerror = () => {
          viewer.innerHTML = '<h1>❌ Error de imagen</h1>';
        };
        viewer.appendChild(img);
        // REMOVED: No auto-advance - manual control only
      }
    }
    
    // Socket events
    socket.on('role', role => console.log('🎬 Role:', role));
    socket.on('media:state', state => {
      media = state.files;
      currentIndex = state.currentIndex;
      if (media.length) showMedia(currentIndex);
    });
    socket.on('media:list', list => media = list);
    socket.on('media:set', index => showMedia(index));
    // No auto nav echo - server controls
    socket.on('video:play', () => {
      const video = viewer.querySelector('video');
      if (video) video.play();
    });
    socket.on('video:pause', () => {
      const video = viewer.querySelector('video');
      if (video) video.pause();
    });
    
    // Socket-driven only (no polling flicker)
    socket.on('connect', () => {
      console.log('Connected - ready for media updates');
    });
  </script>
</body>
</html>
